name: Build Windows Application (with prebuilt P2P)

on:
  workflow_dispatch:
    inputs:
      p2p_version:
        description: 'P2P release version tag (leave empty for latest)'
        type: string
        default: ''
        required: false
      create_release:
        description: 'Create a GitHub Release with artifacts'
        type: boolean
        default: false
        required: false
      release_tag:
        description: 'Release tag (if create_release is true, e.g. v1.0.0)'
        type: string
        default: ''
        required: false

env:
  BUILD_TYPE: Release
  FFMPEG_VERSION: '7.1'  # 可根据需要调整

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # 1. 检出当前项目源码
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 2. 安装 Qt6
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat'

      # 3. 下载并解压 FFmpeg
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          echo "FFMPEG_DIR=${{ github.workspace }}\$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 4. 下载 P2P 预编译库（来自 BigSmart114514/p2p 的 Release）
      - name: Download P2P library
        shell: pwsh
        run: |
          $repo = "BigSmart114514/p2p"
          $tag = "${{ github.event.inputs.p2p_version }}"
          if ([string]::IsNullOrEmpty($tag)) {
            # 获取最新 release
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest"
          } else {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"
          }
          $asset = $release.assets | Where-Object { $_.name -eq "p2p-client-library-windows.zip" }
          if (-not $asset) {
            Write-Error "Asset p2p-client-library-windows.zip not found in release $($release.tag_name)"
            exit 1
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile p2p-client-library-windows.zip
          
          # 解压第一层（得到内层 zip）
          Expand-Archive -Path p2p-client-library-windows.zip -DestinationPath p2p-extract
          # 找到内层 zip 并解压到最终目录
          $innerZip = Get-ChildItem -Path p2p-extract -Filter "*.zip" | Select-Object -First 1
          if (-not $innerZip) {
            Write-Error "Inner zip not found in p2p-client-library-windows.zip"
            exit 1
          }
          Expand-Archive -Path $innerZip.FullName -DestinationPath p2p-lib
          echo "P2P_DIR=${{ github.workspace }}\p2p-lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 5. 配置并构建当前项目
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DFFMPEG_DIR="$env:FFMPEG_DIR" `
            -DP2P_DIR="$env:P2P_DIR"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # 6. 收集产物并打包
      - name: Collect artifacts
        shell: pwsh
        run: |
          $staging = "${{ github.workspace }}\release"
          New-Item -ItemType Directory -Force -Path $staging

          # 复制生成的可执行文件（根据实际项目调整）
          Copy-Item "build\*.exe" $staging\ -ErrorAction SilentlyContinue
          Copy-Item "build\bin\*.exe" $staging\ -ErrorAction SilentlyContinue
          Copy-Item "build\${{ env.BUILD_TYPE }}\*.exe" $staging\ -ErrorAction SilentlyContinue

          # 复制 Qt 运行时 DLL
          $qtBin = Split-Path (Get-Command qmake).Path -Parent
          Get-ChildItem "$qtBin\*.dll" | Where-Object { $_.Name -match "^(Qt6|Qt5)" } | Copy-Item -Destination $staging\

          # 复制 FFmpeg DLL
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" $staging\

          # 复制 P2P 及其依赖 DLL
          Copy-Item "$env:P2P_DIR\bin\*.dll" $staging\

          # 可选：配置文件等
          # Copy-Item "config.json" $staging\

          # 打包
          Compress-Archive -Path "$staging\*" -DestinationPath "${{ github.workspace }}\remote-control-windows.zip"

      # 7. 上传 Artifact（公开）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-control-windows
          path: ${{ github.workspace }}\remote-control-windows.zip
          retention-days: 30

      # 8. 可选：创建 GitHub Release
      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ github.workspace }}\remote-control-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
