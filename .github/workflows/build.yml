name: Build Windows Application

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with artifacts'
        type: boolean
        default: false
        required: false
      release_tag:
        description: 'Release tag (if create_release is true, e.g. v1.0.0)'
        type: string
        default: ''
        required: false

env:
  BUILD_TYPE: Release
  VCPKG_COMMIT: 'c82f74667287d3dc386bce81e44964370c91a289'  # 与 P2P 项目同步
  FFMPEG_VERSION: '7.1'  # 根据实际需要调整

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # 1. 检出当前项目源码
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: current-project

      # 2. 检出 P2P 项目源码（直接克隆到工作目录）
      - name: Checkout P2P repository
        uses: actions/checkout@v4
        with:
          repository: BigSmart114514/p2p
          path: p2p
          submodules: recursive

      # 3. 安装 Qt6
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat'  # 根据项目需要添加模块

      # 4. 下载并解压 FFmpeg 共享库 (Windows 64-bit)
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          # 解压后文件夹名类似 ffmpeg-master-latest-win64-gpl-shared
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          echo "FFMPEG_DIR=${{ github.workspace }}\$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 5. 安装 vcpkg (用于构建 P2P 的依赖)
      - name: Cache vcpkg
        uses: actions/cache@v4
        id: cache-vcpkg
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-windows-${{ env.VCPKG_COMMIT }}

      - name: Setup vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
          cd ${{ github.workspace }}/vcpkg
          git checkout ${{ env.VCPKG_COMMIT }}
          .\bootstrap-vcpkg.bat

      # 6. 缓存 vcpkg 安装的包（加速后续构建）
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/p2p/build/vcpkg_installed
          key: vcpkg-installed-p2p-${{ env.VCPKG_COMMIT }}-${{ hashFiles('p2p/vcpkg.json') }}

      # 7. 构建 P2P 客户端库（参考其 workflow）
      - name: Configure P2P (CMake)
        shell: pwsh
        run: |
          cmake -S p2p -B p2p/build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_SERVER=OFF `
            -DBUILD_CLIENT=ON `
            -DP2P_BUILD_SHARED=ON `
            -DP2P_BUILD_STATIC=ON `
            -DP2P_BUILD_EXAMPLE=OFF

      - name: Build P2P
        run: cmake --build p2p/build --config ${{ env.BUILD_TYPE }} --parallel

      # 8. 将 P2P 产物安装到统一目录（模拟用户本地的 p2p-client-windows 文件夹）
      - name: Install P2P artifacts
        shell: pwsh
        run: |
          $installDir = "${{ github.workspace }}\p2p-install"
          New-Item -ItemType Directory -Force -Path $installDir\include\p2p
          New-Item -ItemType Directory -Force -Path $installDir\lib
          New-Item -ItemType Directory -Force -Path $installDir\bin

          # 头文件
          Copy-Item "p2p\client\include\p2p\*.hpp" "$installDir\include\p2p\"

          # 库文件（静态和动态）
          Copy-Item "p2p\build\lib\${{ env.BUILD_TYPE }}\p2p-client.lib" "$installDir\lib\" -ErrorAction SilentlyContinue
          Copy-Item "p2p\build\lib\${{ env.BUILD_TYPE }}\p2p-client.dll" "$installDir\bin\" -ErrorAction SilentlyContinue
          Copy-Item "p2p\build\bin\${{ env.BUILD_TYPE }}\p2p-client.dll" "$installDir\bin\" -ErrorAction SilentlyContinue

          # 依赖的第三方库（来自 vcpkg）
          $vcpkgLib = "${{ github.workspace }}\p2p\build\vcpkg_installed\x64-windows\lib"
          $vcpkgBin = "${{ github.workspace }}\p2p\build\vcpkg_installed\x64-windows\bin"
          if (Test-Path $vcpkgLib) {
            Copy-Item "$vcpkgLib\*.lib" "$installDir\lib\"
          }
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin\*.dll" "$installDir\bin\"
          }

          echo "P2P_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 9. 配置并构建当前项目
      - name: Configure current project
        shell: pwsh
        run: |
          # 确保 Qt 相关环境变量已由 install-qt-action 设置
          Write-Host "Qt installed at: $env:Qt6_DIR"
          
          cmake -S current-project -B current-project/build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DFFMPEG_DIR="$env:FFMPEG_DIR" `
            -DP2P_DIR="$env:P2P_DIR"

      - name: Build current project
        run: cmake --build current-project/build --config ${{ env.BUILD_TYPE }} --parallel

      # 10. 收集产物并打包
      - name: Collect artifacts
        shell: pwsh
        run: |
          $staging = "${{ github.workspace }}\release"
          New-Item -ItemType Directory -Force -Path $staging

          # 复制生成的可执行文件（根据实际项目调整名称）
          Copy-Item "current-project\build\*.exe" $staging\ -ErrorAction SilentlyContinue
          Copy-Item "current-project\build\bin\*.exe" $staging\ -ErrorAction SilentlyContinue
          Copy-Item "current-project\build\${{ env.BUILD_TYPE }}\*.exe" $staging\ -ErrorAction SilentlyContinue

          # 复制依赖 DLL
          # Qt DLL
          $qtBin = Split-Path (Get-Command qmake).Path -Parent
          Get-ChildItem "$qtBin\*.dll" | Where-Object { $_.Name -match "^(Qt6|Qt5)" } | Copy-Item -Destination $staging\

          # FFmpeg DLL
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" $staging\

          # P2P 及依赖 DLL
          Copy-Item "$env:P2P_DIR\bin\*.dll" $staging\

          # 可选：复制配置文件等
          # Copy-Item "current-project\config.json" $staging\ -ErrorAction SilentlyContinue

          # 打包为 zip
          Compress-Archive -Path "$staging\*" -DestinationPath "${{ github.workspace }}\remote-control-windows.zip"

      # 11. 上传 Artifact（公开可见，任何人均可下载）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-control-windows
          path: ${{ github.workspace }}\remote-control-windows.zip
          retention-days: 30  # 30 天保留期

      # 12. （可选）创建 GitHub Release
      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ github.workspace }}\remote-control-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
