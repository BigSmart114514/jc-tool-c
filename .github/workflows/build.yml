name: Build Windows (MSVC 2022)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (required if create_release is true)'
        type: string
        default: ''

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout current project
        uses: actions/checkout@v4

      - name: Install Qt6 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------- EasyTier ----------
      - name: Download EasyTier FFI artifact
        shell: pwsh
        run: |
          $runId = gh run list --workflow easytier.yml --repo ${{ github.repository }} --limit 1 --status success --json databaseId --jq '.[0].databaseId'
          if (-not $runId) { Write-Error "No successful easytier.yml run found"; exit 1 }
          gh run download $runId --repo ${{ github.repository }} --name easytier-ffi-windows-x64 --dir easytier-ffi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download EasyTier runtime DLLs (Packet.dll, wintun.dll)
        shell: pwsh
        run: |
          $url = "https://github.com/EasyTier/EasyTier/releases/download/v2.6.4/easytier-windows-x86_64-v2.6.4.zip"
          Invoke-WebRequest -Uri $url -OutFile easytier-release.zip
          Expand-Archive -Path easytier-release.zip -DestinationPath easytier-release
          $innerDir = Get-ChildItem -Directory -Path easytier-release | Select-Object -First 1
          $srcDir = if ($innerDir) { $innerDir.FullName } else { "easytier-release" }
          $targetDir = "${{ github.workspace }}/../easytier/bin"
          New-Item -ItemType Directory -Force -Path $targetDir
          Copy-Item -Path "$srcDir\Packet.dll" -Destination $targetDir -Force
          Copy-Item -Path "$srcDir\wintun.dll" -Destination $targetDir -Force

      - name: Deploy EasyTier FFI
        shell: pwsh
        run: |
          $targetDir = "${{ github.workspace }}/../easytier"
          New-Item -ItemType Directory -Force -Path "$targetDir/include"
          New-Item -ItemType Directory -Force -Path "$targetDir/lib"
          New-Item -ItemType Directory -Force -Path "$targetDir/bin"
          Copy-Item -Path "easytier-ffi\easytier_ffi.dll" "$targetDir\bin\" -Force
          Copy-Item -Path "easytier-ffi\easytier_ffi.lib" "$targetDir\lib\easytier_ffi.lib" -Force
          Copy-Item -Path "${{ github.workspace }}\thirdparty\easytier\include\easytier.h" "$targetDir\include\easytier.h" -Force

      # ---------- libssh ----------
      - name: Download and deploy libssh
        shell: pwsh
        run: |
          $url = "https://github.com/ShiftMediaProject/libssh/releases/download/libssh-0.11.1/libssh_libssh-0.11.1_msvc17.zip"
          Invoke-WebRequest -Uri $url -OutFile libssh.zip
          Expand-Archive -Path libssh.zip -DestinationPath libssh-extract
          $targetDir = "${{ github.workspace }}/../libssh"
          New-Item -ItemType Directory -Force -Path "$targetDir/include/libssh"
          New-Item -ItemType Directory -Force -Path "$targetDir/lib"
          New-Item -ItemType Directory -Force -Path "$targetDir/bin"
          Copy-Item -Path "libssh-extract\include\libssh\*.h" -Destination "$targetDir\include\libssh\" -Force
          Copy-Item -Path "libssh-extract\lib\x64\ssh.lib" -Destination "$targetDir\lib\" -Force
          Copy-Item -Path "libssh-extract\lib\x64\libssh.lib" -Destination "$targetDir\lib\" -Force
          Copy-Item -Path "libssh-extract\bin\x64\ssh.dll" -Destination "$targetDir\bin\" -Force

      # ---------- qtermwidget ----------
      - name: Checkout qtermwidget source
        shell: pwsh
        run: |
          git clone --depth 1 --branch 2.4.0 https://github.com/lxqt/qtermwidget.git "${{ github.workspace }}/../qtermwidget-2.4.0"

      # ---------- ConPTY ----------
      - name: Download ConPTY
        shell: pwsh
        run: |
          $conptyDir = "${{ github.workspace }}/../Microsoft.Windows.Console.ConPTY"
          $url = "https://github.com/microsoft/terminal/releases/download/v1.24.11321.0/Microsoft.Windows.Console.ConPTY.1.24.260512001.nupkg"
          Invoke-WebRequest -Uri $url -OutFile conpty.nupkg
          Expand-Archive -Path conpty.nupkg -DestinationPath $conptyDir -Force
          Write-Host "ConPTY deployed to $conptyDir"

      # ---------- CMake 配置 ----------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      # ---------- 编译 ----------
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 8

      # ---------- 打包整个 Release 目录（包含 exe + DLL + platforms 文件夹）----------
      - name: Package Release folder
        shell: pwsh
        run: |
          $releaseDir = "${{ github.workspace }}\build\${{ env.BUILD_TYPE }}"
          if (Test-Path $releaseDir) {
            Write-Host "Contents of Release folder:"
            Get-ChildItem -Recurse $releaseDir
            Compress-Archive -Path "$releaseDir\*" -DestinationPath "${{ github.workspace }}\RemoteControl-Windows.zip"
          } else {
            Write-Error "Release folder not found at $releaseDir"
            exit 1
          }

      # ---------- 上传 artifact ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteControl-Windows
          path: RemoteControl-Windows.zip
          retention-days: 30

      # ---------- 可选：创建 Release ----------
      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: RemoteControl-Windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
