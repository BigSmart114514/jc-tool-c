name: Build Windows (MSVC 2022)

on:
  workflow_dispatch:
    inputs:
      p2p_version:
        description: 'P2P release version tag (leave empty for latest)'
        type: string
        default: ''
      create_release:
        description: 'Create a GitHub Release'
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (required if create_release is true)'
        type: string
        default: ''

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout current project
        uses: actions/checkout@v4

      - name: Install Qt6 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------- FFmpeg ----------
      - name: Download and deploy FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          $targetDir = "${{ github.workspace }}/../ffmpeg"
          New-Item -ItemType Directory -Force -Path $targetDir
          Copy-Item -Path "$($ffmpegDir.FullName)\*" -Destination $targetDir -Recurse -Force

      # ---------- P2P ----------
      - name: Download and deploy P2P library
        shell: pwsh
        run: |
          $repo = "BigSmart114514/p2p"
          $tag = "${{ github.event.inputs.p2p_version }}"
          if ([string]::IsNullOrEmpty($tag)) {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest"
          } else {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"
          }
          $asset = $release.assets | Where-Object { $_.name -eq "p2p-client-library-windows.zip" }
          if (-not $asset) {
            Write-Error "Asset p2p-client-library-windows.zip not found"
            exit 1
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile p2p-client-library-windows.zip
          Expand-Archive -Path p2p-client-library-windows.zip -DestinationPath p2p-extract
          $innerZip = Get-ChildItem -Path p2p-extract -Filter "*.zip" | Select-Object -First 1
          Expand-Archive -Path $innerZip.FullName -DestinationPath p2p-lib
          $targetDir = "${{ github.workspace }}/../p2p-client-windows"
          New-Item -ItemType Directory -Force -Path $targetDir
          Copy-Item -Path "p2p-lib\*" -Destination $targetDir -Recurse -Force

      # ---------- CMake 配置 ----------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DFFMPEG_DIR="${{ github.workspace }}/../ffmpeg" `
            -DP2P_DIR="${{ github.workspace }}/../p2p-client-windows"

      # ---------- 编译 ----------
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 8

      # ---------- 打包整个 Release 目录（包含 exe + DLL + platforms 文件夹）----------
      - name: Package Release folder
        shell: pwsh
        run: |
          $releaseDir = "${{ github.workspace }}\build\${{ env.BUILD_TYPE }}"
          if (Test-Path $releaseDir) {
            Write-Host "Contents of Release folder:"
            Get-ChildItem -Recurse $releaseDir
            Compress-Archive -Path "$releaseDir\*" -DestinationPath "${{ github.workspace }}\RemoteControl-Windows.zip"
          } else {
            Write-Error "Release folder not found at $releaseDir"
            exit 1
          }

      # ---------- 上传 artifact ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteControl-Windows
          path: RemoteControl-Windows.zip
          retention-days: 30

      # ---------- 可选：创建 Release ----------
      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: RemoteControl-Windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
