name: Build FFmpeg Minimal (Windows)

on:
  workflow_dispatch:

jobs:
  build-ffmpeg:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install MSYS2 packages (ffnvcodec, amf, libvpl)
        shell: pwsh
        run: |
          # 添加 MSYS2 到 PATH
          $env:PATH = "C:\msys64\usr\bin;$env:PATH"
          # 更新包数据库并安装
          bash -c "pacman -Syu --noconfirm"
          bash -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-ffnvcodec-headers mingw-w64-ucrt-x86_64-amf-headers mingw-w64-ucrt-x86_64-libvpl"

      - name: Create MSVC-compatible VPL import library
        shell: pwsh
        run: |
          # libvpl-2.dll 位于 C:\msys64\ucrt64\bin
          $dllPath = "C:\msys64\ucrt64\bin\libvpl-2.dll"
          if (-not (Test-Path $dllPath)) {
            Write-Error "libvpl-2.dll not found"
            exit 1
          }
          # 导出符号表
          dumpbin /EXPORTS $dllPath > exports.txt
          # 手动提取函数名（简单起见，直接用 dumpbin 输出生成 .def 文件）
          # 这里写一个简单的脚本生成 .def
          $defContent = @()
          $defContent += "EXPORTS"
          Get-Content exports.txt | ForEach-Object {
            if ($_ -match "^\s+(\d+)\s+[0-9A-F]+\s+[0-9A-F]+\s+(\S+)$") {
              $defContent += $matches[2]
            }
          }
          $defContent | Out-File -FilePath vpl.def -Encoding ascii
          # 使用 MSVC lib.exe 生成 .lib
          lib.exe /def:vpl.def /out:C:\msys64\ucrt64\lib\vpl.lib /machine:x64
          Write-Host "Created vpl.lib from libvpl-2.dll"

      - name: Clone FFmpeg
        run: git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg

      - name: Configure FFmpeg
        shell: bash
        run: |
          export PATH="/c/msys64/usr/bin:$PATH"
          export MSYS2_ARG_CONV_EXCL="*"
          # 使用 MSYS 风格路径（无冒号）
          FFMPEG_SRC="$(cd ffmpeg && pwd)"
          FFMPEG_PREFIX="$(pwd)/ffmpeg-install"
          mkdir -p "$FFMPEG_PREFIX"
          # 设置 PKG_CONFIG_PATH，让 configure 找到 libvpl
          export PKG_CONFIG_PATH="/c/msys64/ucrt64/lib/pkgconfig:/c/msys64/ucrt64/share/pkgconfig"
          cd "$FFMPEG_SRC"
          # 关键：先清理
          make clean 2>/dev/null || true
          ./configure \
            --toolchain=msvc \
            --prefix="$FFMPEG_PREFIX" \
            --enable-shared \
            --disable-static \
            --disable-everything \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-libvpl \
            --enable-decoder=hevc \
            --enable-encoder=hevc_nvenc,hevc_amf,hevc_qsv \
            --enable-parser=hevc \
            --enable-hwaccel=hevc_dxva2,hevc_d3d11va,hevc_nvenc \
            --extra-cflags="-I/c/msys64/ucrt64/include -DWIN32_LEAN_AND_MEAN" \
            --extra-ldflags="-LIBPATH:C:/msys64/ucrt64/lib" \
            --disable-x86asm
          # 验证
          grep -E 'CONFIG_HEVC_(NVENC|AMF|QSV)' config.h || echo "Missing some encoders"

      - name: Build and install FFmpeg
        shell: bash
        run: |
          export PATH="/c/msys64/usr/bin:$PATH"
          cd ffmpeg
          # 必须 clean 避免缓存
          make clean
          make -j$(nproc)
          make install

      - name: Upload FFmpeg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-minimal
          path: ffmpeg-install